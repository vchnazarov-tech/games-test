<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Terminal Breach — DTF card</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #edeef0;
    font-family: 'Roboto', sans-serif;
    display: flex;
    justify-content: center;
    padding: 24px 16px;
  }

  /* ─── КАРТОЧКА ─── */
  .post-card {
    width: 640px;
    background: #fff;
    border-radius: 10px;
    overflow: hidden;
  }

  .post-inner {
    padding: 0 24px;
  }

  /* ─── ШАПКА ─── */
  .post-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 0 12px;
  }

  .author-block {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  /* Аватар с градиентом */
  .avatar-wrap {
    position: relative;
    width: 40px;
    height: 40px;
    flex-shrink: 0;
  }

  .avatar-main {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: conic-gradient(
      from 90deg,
      #6ed0ff 0deg,
      #61a1ff 42deg,
      #9d70ff 89deg,
      #ff60c7 137deg,
      #ff483e 180deg,
      #ff9400 223deg,
      #ffde48 270deg,
      #7ae632 306deg,
      #6fd1ff 359deg,
      #6ed0ff 360deg
    );
    outline: 1px solid rgba(0,0,0,0.10);
    outline-offset: -1px;
  }

  /* DTF-бейдж */
  .avatar-badge {
    position: absolute;
    bottom: -2px;
    right: -4px;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #1693E5;
    border: 2px solid #fff;
  }

  .author-info {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }

  .author-name {
    font-size: 15px;
    font-weight: 500;
    color: #000;
    line-height: 22px;
  }

  .author-meta {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .author-section {
    font-size: 13px;
    font-weight: 400;
    color: #000;
    line-height: 18px;
  }

  .author-time {
    font-size: 13px;
    color: #595959;
    line-height: 18px;
  }

  /* Кнопки справа */
  .header-actions {
    display: flex;
    align-items: center;
  }

  .btn-subscribe {
    font-family: 'Roboto', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: #000;
    background: #F4F4F4;
    border: none;
    border-radius: 8px;
    padding: 5px 10px;
    height: 28px;
    cursor: pointer;
    line-height: 18px;
  }
  .btn-subscribe:hover { background: #e8e8e8; }

  .btn-more {
    width: 38px;
    height: 38px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    background: transparent;
    cursor: pointer;
    border-radius: 50%;
    padding: 9px 8px;
  }
  .btn-more:hover { background: #f4f4f4; }

  /* ─── ЗАГОЛОВОК ─── */
  .post-title-row {
    padding-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .post-title {
    font-size: 22px;
    font-weight: 500;
    color: #000;
    line-height: 30px;
  }

  /* ─── КОНТЕНТ-БЛОК (игровой экран) ─── */
  .post-content {
    width: 592px;
    height: 592px;
    background: #fff;
    border-radius: 10px;
    border: 1px solid rgba(0,0,0,0.10);
    margin-bottom: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #bbb;
    font-size: 14px;
  }

  /* ─── РЕАКЦИИ ─── */
  .reactions-bar {
    padding-top: 20px;
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
  }

  .reaction {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 4px 8px;
    border-radius: 80px;
    cursor: pointer;
    font-size: 15px;
    font-weight: 400;
    line-height: 22px;
    color: #595959;
  }

  .reaction-active {
    background: #0B5DD7;
    color: #fff;
  }

  .reaction-inactive {
    background: #F5F5F5;
  }
  .reaction-inactive:hover { background: #ebebeb; }

  .reaction-add {
    background: #F5F5F5;
    border-radius: 80px;
    width: 30px;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: #595959;
  }
  .reaction-add:hover { background: #ebebeb; }

  /* ─── ЭКШЕН-БАР ─── */
  .action-bar {
    padding: 12px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .action-left {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .action-btn {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 4px 8px 4px 0;
    border: none;
    background: transparent;
    cursor: pointer;
    border-radius: 56px;
    font-family: 'Roboto', sans-serif;
    font-size: 15px;
    color: #595959;
    line-height: 22px;
  }
  .action-btn:hover { background: #f4f4f4; }

  .action-icon-btn {
    width: 36px;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    background: transparent;
    cursor: pointer;
    border-radius: 8px;
    padding: 4px 8px;
  }
  .action-icon-btn:hover { background: #f4f4f4; }

  .action-right {
    display: flex;
    align-items: center;
    gap: 4px;
    padding-left: 12px;
    color: #595959;
    font-size: 15px;
    line-height: 22px;
  }

</style>
</head>
<body>

<div class="post-card">
  <div class="post-inner">

    <!-- Шапка -->
    <div class="post-header">
      <div class="author-block">
        <div class="avatar-wrap">
          <div class="avatar-main"></div>
          <div class="avatar-badge"></div>
        </div>
        <div class="author-info">
          <div class="author-name">Терминал</div>
          <div class="author-meta">
            <span class="author-section">Игры</span>
            <span class="author-time">2ч</span>

      <div class="header-actions">

    <!-- Контент-блок (игра) -->
    <div class="post-content" style="padding:0;overflow:hidden;background:#000;border-radius:10px;border:1px solid rgba(0,0,0,0.10);">
      <div id="game-root" style="width:592px;height:592px;position:relative;"></div>
    </div>

    <!-- Реакции -->
    <div class="reactions-bar">

              <stop offset="1" stop-color="#F35565"/>
            </linearGradient>
          </defs>
        </svg>
        <span style="color:#fff;font-weight:400">100</span>

      <!-- Огонь -->
      <div class="reaction reaction-inactive">
        <svg width="17" height="20" viewBox="0 0 17 20" fill="none">

      <!-- Плюс / переключение темы -->
      <div class="reaction-add" id="theme-toggle" title="Сменить тему">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path fill-rule="evenodd" clip-rule="evenodd" d="M10 4.415C10.461 4.415 10.835 4.789 10.835 5.25V9.165H14.75C15.211 9.165 15.585 9.539 15.585 10C15.585 10.461 15.211 10.835 14.75 10.835H10.835V14.75C10.835 15.211 10.461 15.585 10 15.585C9.539 15.585 9.165 15.211 9.165 14.75V10.835H5.25C4.789 10.835 4.415 10.461 4.415 10C4.415 9.539 4.789 9.165 5.25 9.165H9.165V5.25C9.165 4.789 9.539 4.415 10 4.415Z" fill="#595959"/>
        </svg>
      </div>
    </div>

    <!-- Экшен-бар -->
    <div class="action-bar">
      <div class="action-left">
        <!-- Комментарии -->
        <button class="action-btn">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path fill-rule="evenodd" clip-rule="evenodd" d="M17.48 9.78C17.48 5.28 13.83 2.5 9.78 2.5C5.74 2.5 2.1 5.27 2.08 9.75C2.07 14.24 5.64 17.06 9.78 17.06C10.87 17.06 11.74 17 12.8 16.58C12.96 16.52 13.22 16.52 13.47 16.6L16.01 17.44C16.61 17.63 17.14 17.34 17.44 17.04C17.76 16.73 18.03 16.2 17.87 15.59L17.06 13.08C16.95 12.75 16.95 12.38 17.02 12.19L17.06 12.06C17.29 11.42 17.48 10.89 17.48 9.78ZM9.78 4.17C6.46 4.17 3.75 6.38 3.75 9.78C3.75 13.18 6.46 15.39 9.78 15.39C10.8 15.39 11.42 15.34 12.18 15.04C12.79 14.79 13.47 14.84 14 15.02L16.16 15.74L15.43 13.56C15.29 13.01 15.22 12.25 15.45 11.62L15.5 11.48C15.7 10.91 15.82 10.6 15.82 9.78C15.82 6.38 13.1 4.17 9.78 4.17Z" fill="#595959"/>
          </svg>
          76
        </button>

        <!-- Репост -->
        <button class="action-btn">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path fill-rule="evenodd" clip-rule="evenodd" d="M12.74 3.578C13.07 3.253 13.6 3.253 13.92 3.578L18.09 7.744C18.41 8.07 18.41 8.597 18.09 8.923L13.92 13.09C13.6 13.415 13.07 13.415 12.74 13.09C12.42 12.764 12.42 12.237 12.74 11.911L15.42 9.234C12.84 9.015 9.97 9.331 7.66 10.203C4.98 11.214 3.33 12.843 3.33 15C3.33 15.46 2.96 15.834 2.5 15.834C2.04 15.833 1.67 15.46 1.67 15C1.67 11.797 4.15 9.746 7.07 8.643C9.64 7.674 12.76 7.336 15.56 7.573L12.74 4.756C12.42 4.43 12.42 3.903 12.74 3.578Z" fill="#595959"/>
          </svg>

        <!-- Закладка -->
        <button class="action-icon-btn">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path fill-rule="evenodd" clip-rule="evenodd" d="M3.33 5.83C3.33 3.99 4.83 2.5 6.67 2.5H13.33C15.17 2.5 16.67 3.99 16.67 5.83V15.87C16.67 17.23 15.1 17.99 14.04 17.15L10.44 14.32C10.18 14.12 9.82 14.12 9.56 14.32L5.96 17.15C4.9 17.99 3.33 17.23 3.33 15.87V5.83ZM6.67 4.17C5.75 4.17 5 4.91 5 5.83V15.79L8.53 13.01C9.39 12.33 10.61 12.33 11.47 13.01L15 15.79V5.83C15 4.91 14.25 4.17 13.33 4.17H6.67Z" fill="#595959"/>

      <!-- Просмотры -->
      <div class="action-right">

  </div><!-- /post-inner -->
</div>

<style>
  @font-face {
    font-family: 'Departure Mono';
    src: url('DepartureMono-Regular.woff2') format('woff2'),
         url('DepartureMono-Regular.woff') format('woff'),
         url('DepartureMono-Regular.otf') format('opentype');
    font-weight: normal;
    font-style: normal;
  }
</style>
<style>
  /* ─── DEPARTURE MONO PALETTE ─── */
  #game-root {
    --amber:   #ffa133;
    --pumpkin: #e47b1a;
    --foam:    #bccabb;
    --cement:  #c0c0c0;
    --clay:    #9a9a7e;
    --mud:     #b8b898;
    --carbon:   #1a1614;
    --black:    #0f0d0b;
    --cell-bg:  #161210;
    --surface:  #1e1a14;
    --surface2: #2a2418;
    --border:   #2e2820;
    --flick:    cubic-bezier(.36, 2.09, .07, -1.52);
    --fast:     80ms;

    font-family: 'Departure Mono', monospace;
    font-synthesis: none;
    text-rendering: optimizeLegibility;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;

    background-color: var(--black);
    background-image:
      /* Левый низ — широкий, смещён чуть выше угла */
      radial-gradient(ellipse 62% 42% at 4% 6%, rgba(210,88,8,0.40) 0%, transparent 70%),
      /* Правый верх — вытянутый горизонтально */
      radial-gradient(ellipse 58% 32% at 96% 4%, rgba(178,72,5,0.28) 0%, transparent 65%),
      /* Левый верх — компактный, плотный */
      radial-gradient(ellipse 32% 28% at 1% 2%,  rgba(152,60,5,0.22) 0%, transparent 72%),
      /* Правый низ — низкий и широкий */
      radial-gradient(ellipse 52% 36% at 98% 97%, rgba(162,66,5,0.22) 0%, transparent 62%),
      /* Артефакт — правый край посередине */
      radial-gradient(ellipse 18% 22% at 100% 58%, rgba(188,76,5,0.14) 0%, transparent 80%);
    color: var(--cement);
    user-select: none;
  }


  /* ─── ТЕМА: CYBERPUNK ─── */
  #game-root[data-theme="cyber"] {
    --amber:    #c8f700;
    --pumpkin:  #8fd400;
    --foam:     #78b840;
    --cement:   #b4c87a;
    --clay:     #6e7c52;
    --mud:      #8a9a68;
    --black:    #0a0f06;
    --cell-bg:  #111808;
    --carbon:   #151e0a;
    --surface:  #141e0a;
    --surface2: #1a2810;
    --border:   #1e2c12;
    background-image:
      radial-gradient(ellipse 62% 42% at 4% 6%,  rgba(100,190,0,0.38) 0%, transparent 70%),
      radial-gradient(ellipse 58% 32% at 96% 4%,  rgba(80,160,0,0.24) 0%, transparent 65%),
      radial-gradient(ellipse 32% 28% at 1%  2%,  rgba(70,140,0,0.18) 0%, transparent 72%),
      radial-gradient(ellipse 52% 36% at 98% 97%, rgba(80,150,0,0.18) 0%, transparent 62%),
      radial-gradient(ellipse 18% 22% at 100% 58%,rgba(90,165,0,0.10) 0%, transparent 80%);
  }

  #game-root[data-theme="cyber"]::after {
    background:
      radial-gradient(ellipse 42% 40% at 50% 48%, rgba(200,247,0,0.04) 0%, transparent 100%),
      repeating-linear-gradient(to bottom, transparent 0px, transparent 2px, rgba(0,0,0,0.16) 2px, rgba(0,0,0,0.16) 4px);
  }

  #game-root[data-theme="cyber"]::before {
    background: linear-gradient(to bottom,
      transparent              0%,
      rgba(200,247,0,0.04)    30%,
      rgba(200,247,0,0.10)    50%,
      rgba(200,247,0,0.04)    70%,
      transparent             100%
    );
  }

  /* ─── GAME LAYOUT GROUPS ─── */
  .g-top, .g-bottom {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
  }

  /* ─── HEADER BAR ─── */
  .g-header {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 28px 0;
    box-sizing: border-box;
  }

  .g-label {
    font-size: 13px;
    color: var(--clay);
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }

  .g-label::before {
    content: '░  ';
    color: var(--mud);
    letter-spacing: 0;
  }

  .g-difficulty {
    font-size: 13px;
    color: var(--amber);
    letter-spacing: 0.14em;
    border: 1px solid var(--pumpkin);
    border-radius: 0;
    padding: 2px 8px;
  }

  /* ─── TIMER BAR ─── */
  .g-timer-wrap {
    width: calc(100% - 56px);
    margin: 16px 28px 0;
    box-sizing: border-box;
  }

  .g-timer-meta {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: var(--clay);
    letter-spacing: 0.14em;
    margin-bottom: 5px;
  }

  #timerNum { color: var(--cement); font-size: 16px; line-height: 1; letter-spacing: 0; }

  .g-timer-track {
    width: 100%;
    height: 3px;
    background: var(--surface2);
    border-radius: 0;
    overflow: hidden;
  }

  .g-timer-fill {
    height: 100%;
    background: var(--amber);
  }

  /* ─── ERRORS ─── */
  .g-errors {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--clay);
    margin: 16px 28px 0;
    align-self: flex-start;
    letter-spacing: 0.14em;
    padding-left: 0;
  }

  .g-error-dots { display: flex; gap: 5px; }

  .g-dot {
    width: 7px;
    height: 7px;
    border-radius: 0;
    border: 1px solid var(--clay);
    background: transparent;
  }

  .g-dot.active {
    background: var(--pumpkin);
    border-color: var(--amber);
  }

  /* ─── WORD CELLS ─── */
  .g-cells {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    flex-wrap: nowrap;
  }

  .g-cell {
    width: 44px;
    height: 66px;
    border: 1px solid var(--clay);
    border-radius: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    cursor: default;
    flex-shrink: 0;
    position: relative;
    background: transparent;
    transition: border-color var(--fast) var(--flick),
                background-color var(--fast) var(--flick);

  const CYRILLIC   = 'АБВГДЕЖЗИЙКЛМНОПРСТУФХЦЧШЩЫЬЭЮЯ';
  const GLITCH_CHARS = '@#$%&!?~^*/<>|\\[]{}';

  const KB_ROWS = [
    ['Й','Ц','У','К','Е','Н','Г','Ш','Щ','З','Х','Ъ'],
    ['Ф','Ы','В','А','П','Р','О','Л','Д','Ж','Э'],
    ['Я','Ч','С','М','И','Т','Ь','Б','Ю'],
  ];

  const MAX_ERRORS = 5;

  // ─── СОСТОЯНИЕ ───
  let levelIndex   = 0;
  let gameState    = 'start';
  let PUZZLE       = [];
  let revealed     = {};
  let wrongGuesses = {};
  let errors       = 0;
  let timeLeft     = 0;
  let timerInterval = null;
  let selectedIndex = null;   // индекс выбранной ячейки
  let revealedHidden = {};    // index → letter, для hidden-ячеек отдельно
  let levelResults  = [];

  // Случайный пазл на каждый уровень
  function pickPuzzle(level) {
    const puzzles = level.puzzles;
    return puzzles[Math.floor(Math.random() * puzzles.length)];
  }

  const root = document.getElementById('game-root');

  // Быстрое мерцание яркости фона
  setInterval(() => {
    const el = document.getElementById('shake');
    if (!el) return;
    const b = (0.88 + Math.random() * 0.15).toFixed(2);
    el.style.filter = `brightness(${b})`;
  }, 30);



  /* ─── SCRAMBLE: буква "прокручивается" перед появлением ─── */
  function scrambleReveal(cellEl, finalLetter) {
    const el = cellEl.querySelector('.g-cell-letter');
    if (!el) return;
    let frame = 0;
    const total = 7;
    const id = setInterval(() => {
      if (frame >= total) { clearInterval(id); el.textContent = finalLetter; return; }
      el.textContent = GLITCH_CHARS[Math.floor(Math.random() * GLITCH_CHARS.length)];
      frame++;
    }, 38);
  }

  /* ─── GHOST: нераскрытые ячейки иногда "мерцают" случайной буквой ─── */
  let ghostRunning   = false;
  let cellsEntering  = false;
  let hintTimer      = null;
  function ghostTick() {
    ghostRunning = true;
    if (gameState === 'game' || gameState === 'start') {
      const candidates = PUZZLE.reduce((acc, c, i) => {
        if (!isCellDone(c, i)) acc.push(i);
        return acc;
      }, []);
      if (candidates.length > 0) {
        const idx = candidates[Math.floor(Math.random() * candidates.length)];
        const cellEls = document.querySelectorAll('#cells .g-cell');
        const el = cellEls[idx] && cellEls[idx].querySelector('.g-cell-letter');
        if (el) {
          const orig = el.textContent;
          const origColor = el.style.color;
          el.textContent = GLITCH_CHARS[Math.floor(Math.random() * GLITCH_CHARS.length)];
          el.style.color = 'var(--clay)';
          setTimeout(() => { if (el) { el.textContent = orig; el.style.color = origColor; } }, 90);
        }
      }
    }
    setTimeout(ghostTick, 1800 + Math.random() * 2400);
  }

  /* ─── OPEN GLITCH: символьный или RGB-сдвиг на открытых/угаданных буквах ─── */
  const RGB_OPEN   = 'rgba(200,235,140,0.90)';
  const RGB_OPEN2  = 'rgba(200,85,10,0.75)';
  const RGB_SOLVED = 'rgba(255,218,55,0.95)';
  const RGB_SOLVED2= 'rgba(155,38,5,0.80)';

  function openGlitchOne(cellEl) {
    const el = cellEl.querySelector('.g-cell-letter');
    if (!el || el.dataset.glitching) return;
    el.dataset.glitching = '1';
    if (Math.random() < 0.2) {
      const orig = el.textContent;
      el.textContent = GLITCH_CHARS[Math.floor(Math.random() * GLITCH_CHARS.length)];
      setTimeout(() => { if (el) { el.textContent = orig; delete el.dataset.glitching; } }, 60);
    } else {
      const isSolved = cellEl.classList.contains('solved');
      const c1 = isSolved ? RGB_SOLVED  : RGB_OPEN;
      const c2 = isSolved ? RGB_SOLVED2 : RGB_OPEN2;
      const offset = Math.random() < 0.5 ? 2 : 3;
      el.style.textShadow = `-${offset}px 0 ${c1}, ${offset}px 0 ${c2}`;
      setTimeout(() => { if (el) { el.style.textShadow = ''; delete el.dataset.glitching; } }, 80);
    }
  }

  function openGlitchTick() {
    if (gameState === 'game' || gameState === 'start') {
      const cellEls = Array.from(document.querySelectorAll('#cells .g-cell.open, #cells .g-cell.solved'));
      if (cellEls.length > 0) {
        // всегда глитчим одну, иногда вторую
        openGlitchOne(cellEls[Math.floor(Math.random() * cellEls.length)]);
        if (cellEls.length > 1 && Math.random() < 0.4) {
          openGlitchOne(cellEls[Math.floor(Math.random() * cellEls.length)]);
        }
      }
    }
    setTimeout(openGlitchTick, 1800 + Math.random() * 2500);
  }

  function triggerGlitch(cls, duration) {
    root.classList.remove('glitch-hit', 'glitch-fail', 'glitch-win');
    void root.offsetWidth; // reflow — перезапускает анимацию
    root.classList.add(cls);
    setTimeout(() => root.classList.remove(cls), duration);
  }

  function currentLevel() { return LEVELS[levelIndex]; }

  // ─── ФОРМУЛА ОЧКОВ ───
  function calcScore(timer, timeLeft, base) {
    const pct = timeLeft / timer;
    const speedBonus = pct > 0.8 ? 3 : pct > 0.5 ? 2 : pct > 0.3 ? 1 : 0;
    return base + speedBonus;
  }

  function render() {
    root.innerHTML = '<div class="g-jitter" id="jitter"><div class="g-shake" id="shake"></div></div>';
    if      (gameState === 'start') renderStart();
    else if (gameState === 'final') renderFinal();
    else                            renderGame();
  }

  function jitterRoot() {
    return document.getElementById('shake') || root;
  }

  function jitterEl() {
    return document.getElementById('jitter') || root;
  }

  function appendKeyboard() {
    const old = document.getElementById('kb-wrap');
    if (old) old.remove();

    const wrap = document.createElement('div');
    wrap.id = 'kb-wrap';
    wrap.style.cssText = 'position:absolute;bottom:28px;left:50%;transform:translateX(-50%);';

    const kb = document.createElement('div');
    kb.id = 'keyboard';
    kb.className = 'g-keyboard';
    kb.style.cssText = 'margin:0;width:auto;padding:0;';
    KB_ROWS.forEach(row => {
      const rowDiv = document.createElement('div');
      rowDiv.className = 'g-kb-row';
      row.forEach(letter => {
        const btn = document.createElement('button');
        btn.textContent = letter;
        btn.className = 'g-key';
        btn.onclick = () => handleKey(letter);
        rowDiv.appendChild(btn);
      });
      kb.appendChild(rowDiv);
    });
    wrap.appendChild(kb);
    jitterEl().appendChild(wrap);
  }

  function appendBtn(label, id, onclick, hidden) {
    const btn = document.createElement('button');
    btn.className = 'g-start-btn';
    btn.id = id;
    btn.textContent = label;
    btn.style.cssText = 'position:absolute;bottom:28px;left:50%;transform:translateX(-50%);margin:0;' + (hidden ? 'visibility:hidden' : '');
    btn.onclick = onclick;
    jitterEl().appendChild(btn);
    return btn;
  }

  /* ─── СТАРТОВЫЙ ЭКРАН ─── */
  function renderStart() {
    PUZZLE = pickPuzzle(currentLevel());
    const lv = currentLevel();
    jitterRoot().innerHTML = `
      <div class="g-header" style="position:absolute;top:0;left:0;right:0;">

      <div class="g-top">

    const lv = currentLevel();

  /* ─── ФИНАЛЬНЫЙ ЭКРАН ─── */
  function renderFinal() {
    const totalScore = levelResults.reduce((s, r) => s + r.score, 0);
    const allWon = levelResults.length === LEVELS.length && levelResults.every(r => r.outcome === 'granted');
    const sessionLabel = allWon ? 'СЕССИЯ ЗАВЕРШЕНА' : 'СЕССИЯ ПРЕРВАНА';

    const rowData = levelResults.map((r, i) => {
      const lv = LEVELS[i];
      const statusText = r.outcome === 'granted'  ? 'ACCESS_GRANTED'
                       : r.outcome === 'detected'  ? 'DETECTED'
                       :                             'CONNECTION_LOST';
      return { label: lv.label, status: statusText, score: r.score };
    });

    const rowsHTML = rowData.map((r, i) => `
      <div class="g-result-row entering" id="result-row-${i}" style="animation-delay:${350 + i * 170}ms">
        <span class="g-result-label">${r.label}</span>
        <span class="g-result-status">${r.status}</span>
        <span class="g-result-score">${r.score > 0 ? '+' + r.score : '0'}</span>
      </div>`).join('');

    jitterRoot().innerHTML = `
      <div class="g-header">
        <span class="g-difficulty">ИТОГ</span>
      </div>
      <div style="flex:1;display:flex;flex-direction:column;justify-content:center;width:100%">
        <div class="g-final-wrap">
          <div class="g-final-total-label">${sessionLabel}</div>
          <div class="g-final-total" id="finalScore">—</div>
          <div class="g-result-list" id="resultList">${rowsHTML}</div>
        </div>
      </div>
    `;
    appendBtn('[ НАЧАТЬ СНАЧАЛА ]', 'restartBtn', restartAll, true);

    // Счёт стартует одновременно с первой строкой
    setTimeout(() => {
      const scoreEl = document.getElementById('finalScore');
      if (scoreEl) {
        if (totalScore === 0) { scoreEl.textContent = '0'; }
        else {
          let cur = 0;
          const step = Math.ceil(totalScore / 20);
          const id = setInterval(() => {
            cur = Math.min(cur + step, totalScore);
            scoreEl.textContent = cur;
            if (cur >= totalScore) clearInterval(id);
          }, 45);
        }
      }
    }, 350);

    // Кнопка — после последней строки
    const afterRows = 350 + rowData.length * 320;
    setTimeout(() => {
      const btn = document.getElementById('restartBtn');
      if (btn) btn.style.visibility = 'visible';
    }, afterRows);
  }

  function restartAll() {
    levelIndex     = 0;
    levelResults   = [];
    revealed       = {};
    revealedHidden = {};
    wrongGuesses   = {};
    errors         = 0;
    selectedIndex  = null;
    PUZZLE         = [];
    clearInterval(timerInterval);
    gameState      = 'start';
    render();
  }

  /* ─── ЯЧЕЙКИ ─── */
  function isCellDone(cell, idx) {
    if (cell.status === 'open')   return true;
    if (cell.status === 'hidden') return revealedHidden[idx] !== undefined;
    return revealed[cell.code] !== undefined;
  }

  function firstUnfinished() {
    const idx = PUZZLE.findIndex((c, i) => !isCellDone(c, i) && c.status !== 'open');
    return idx === -1 ? null : idx;
  }

  function renderCells(interactive) {
    const wrap = document.getElementById('cells');
    if (!wrap) return;
    PUZZLE.forEach((cell, idx) => {
      const div = document.createElement('div');
      const isOpen   = cell.status === 'open';
      const isHidden = cell.status === 'hidden';
      const isDone   = isCellDone(cell, idx);
      const selectedCell = selectedIndex !== null ? PUZZLE[selectedIndex] : null;
      const isGroupHighlighted = interactive
        && selectedCell
        && selectedCell.status !== 'hidden'
        && cell.status !== 'hidden'
        && !isOpen && !isDone
        && cell.code === selectedCell.code
        && selectedIndex !== idx;

      const isSelected = interactive && selectedIndex === idx && !isOpen && !isDone;

      let cls = 'g-cell';
      let letterContent, codeContent;

      if (isOpen) {
        cls += ' open';
        letterContent = cell.letter;
        codeContent   = cell.code;
      } else if (isHidden && revealedHidden[idx] !== undefined) {
        cls += ' solved';
        letterContent = revealedHidden[idx];
        codeContent   = '?';
      } else if (!isHidden && revealed[cell.code] !== undefined) {
        cls += ' solved';
        letterContent = revealed[cell.code];
        codeContent   = cell.code;
      } else if (isHidden) {
        cls += isSelected ? ' selected' : ' number';
        letterContent = '_';
        codeContent   = '?';
      } else {
        cls += isSelected ? ' selected' : isGroupHighlighted ? ' grouped' : ' number';
        letterContent = '_';
        codeContent   = cell.code;
      }

      if (cellsEntering) cls += ' entering';
      div.className = cls;
      if (cellsEntering) div.style.animationDelay = (idx * 0.04) + 's';
      div.innerHTML = `
        <div class="g-cell-letter">${letterContent}</div>
        <div class="g-cell-code">${codeContent}</div>
      `;
      if (interactive && !isOpen && !isDone && gameState === 'game') {
        div.onclick = () => selectCell(idx);
      }
      wrap.appendChild(div);
    });
  }

  function selectCell(idx) {
    if (gameState !== 'game') return;
    selectedIndex = (selectedIndex === idx) ? null : idx;
    refreshCells();
    refreshKeyboard();
  }

  function refreshCells() {
    const wrap = document.getElementById('cells');
    if (!wrap) return;
    wrap.innerHTML = '';
    renderCells(true);
  }

  function refreshKeyboard() {
    appendKeyboard();
  }

  /* ─── ИНДИКАТОР ОШИБОК ─── */
  function renderErrors() {
    const h = document.getElementById('hint');
    if (!h || hintTimer) return;
    h.innerHTML = '';
    const row = document.createElement('div');
    row.style.cssText = 'display:flex;align-items:center;gap:8px;';
    const lbl = document.createElement('span');
    lbl.textContent = 'ОШИБКИ:';
    lbl.style.cssText = 'font-size:13px;color:var(--clay);letter-spacing:0.14em;';
    row.appendChild(lbl);
    const dots = document.createElement('div');
    dots.className = 'g-error-dots';
    for (let i = 0; i < MAX_ERRORS; i++) {
      const d = document.createElement('div');
      const isNew = (i === errors - 1);
      d.className = 'g-dot' + (i < errors ? ' active' : '') + (isNew ? ' new' : '');
      dots.appendChild(d);
    }
    row.appendChild(dots);
    h.appendChild(row);
  }

  /* ─── КЛАВИАТУРА ─── */
  function renderKeyboard() {
    const kb = document.getElementById('keyboard');
    if (!kb) return;
    KB_ROWS.forEach(row => {
      const rowDiv = document.createElement('div');
      rowDiv.className = 'g-kb-row';
      row.forEach(letter => {
        const btn = document.createElement('button');
        btn.textContent = letter;
        // Все клавиши всегда активны
        btn.className = 'g-key';
        btn.onclick = () => handleKey(letter);
        rowDiv.appendChild(btn);
      });
      kb.appendChild(rowDiv);
    });
  }

  /* ─── НАЖАТИЕ КЛАВИШИ ─── */
  function handleKey(letter) {
    if (gameState !== 'game') return;

    if (selectedIndex === null) {
      const idx = firstUnfinished();
      if (idx === null) return;
      selectedIndex = idx;
    }

    const idx  = selectedIndex;
    const cell = PUZZLE[idx];
    if (!cell || isCellDone(cell, idx)) return;

    if (cell.letter === letter) {
      if (cell.status === 'hidden') {
        revealedHidden[idx] = letter;   // открываем только эту ячейку
      } else {
        revealed[cell.code] = letter;   // открываем все NUMBER с этим кодом
      }

      // Scramble + solve flash — анимируем только что раскрытые ячейки
      refreshCells();
      requestAnimationFrame(() => {
        const cellEls = document.querySelectorAll('#cells .g-cell');
        if (cell.status === 'hidden') {
          if (cellEls[idx]) {
            scrambleReveal(cellEls[idx], letter);
            cellEls[idx].classList.add('solving');
            setTimeout(() => cellEls[idx] && cellEls[idx].classList.remove('solving'), 600);
          }
        } else {
          PUZZLE.forEach((c, i) => {
            if (c.code === cell.code && c.status !== 'hidden' && cellEls[i]) {
              scrambleReveal(cellEls[i], letter);
              cellEls[i].classList.add('solving');
              setTimeout(() => cellEls[i] && cellEls[i].classList.remove('solving'), 600);
            }
          });
        }
      });

      const allSolved = PUZZLE.every((c, i) => isCellDone(c, i));
      if (allSolved) {
        clearInterval(timerInterval);
        gameState = 'over';
        const lv = currentLevel();
        const score = calcScore(lv.timer, timeLeft, lv.base);
        levelResults.push({ outcome: 'granted', score });
        selectedIndex = null;
        setHint('ACCESS_GRANTED');
        triggerGlitch('glitch-win', 600);
        refreshKeyboard();
        setTimeout(() => advanceLevel(true), 1800);
        return;
      } else {
        selectedIndex = firstUnfinished();
      }
    } else {
      if (!wrongGuesses[idx]) wrongGuesses[idx] = new Set();
      wrongGuesses[idx].add(letter);
      errors++;
      triggerGlitch('glitch-hit', 300);
      renderErrors();
      if (errors >= MAX_ERRORS) {
        clearInterval(timerInterval);
        gameState = 'over';
        levelResults.push({ outcome: 'detected', score: 0 });
        selectedIndex = null;
        setHint('DETECTED');
        triggerGlitch('glitch-fail', 850);
        refreshCells();
        refreshKeyboard();
        setTimeout(() => advanceLevel(false), 1800);
        return;
      }
    }
    refreshCells();
    refreshKeyboard();
  }

  function setHint(text) {
    const h = document.getElementById('hint');
    if (!h) return;
    if (hintTimer) { clearInterval(hintTimer); hintTimer = null; }
    h.textContent = '';
    let i = 0;
    hintTimer = setInterval(() => {
      h.textContent = text.slice(0, ++i);
      if (i >= text.length) { clearInterval(hintTimer); hintTimer = null; }
    }, 28);
  }

  /* ─── ПЕРЕХОД МЕЖДУ УРОВНЯМИ ─── */
  function exitCells(cb) {
    const cells = document.querySelectorAll('.g-cell');
    const total = cells.length;
    if (!total) { cb(); return; }
    cells.forEach((el, i) => {
      el.classList.add('leaving');
      el.style.animationDelay = (i * 0.04) + 's';
    });
    setTimeout(cb, total * 40 + 20);
  }

  function advanceLevel(won) {
    if (!won) {
      gameState = 'final';
      render();
      return;
    }
    levelIndex++;
    if (levelIndex >= LEVELS.length) {
      exitCells(() => { gameState = 'final'; render(); });
    } else {
      exitCells(() => {
        PUZZLE = pickPuzzle(currentLevel());
        startGame();
      });
    }
  }

  /* ─── СТАРТ УРОВНЯ ─── */
  function startGame(animate = true) {
    // PUZZLE уже выбран в renderStart — не перевыбираем
    revealed       = {};
    revealedHidden = {};
    wrongGuesses   = {};
    errors         = 0;
    timeLeft       = currentLevel().timer;
    selectedIndex  = null;
    gameState      = 'game';
    cellsEntering  = animate;
    render();
    const first = firstUnfinished();
    if (first !== null) { selectedIndex = first; refreshCells(); refreshKeyboard(); }
    renderErrors();
    cellsEntering  = false;
    startTimer();
    // циклы уже запущены при инициализации
  }

  function startTimer() {
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      if (gameState !== 'game') { clearInterval(timerInterval); return; }
      timeLeft--;
      const lv = currentLevel();
      const fill = document.getElementById('timerFill');
      const num  = document.getElementById('timerNum');
      if (fill) {
        fill.style.width = Math.round((timeLeft / lv.timer) * 100) + '%';
        fill.classList.toggle('urgent', timeLeft <= Math.ceil(lv.timer * 0.2));
      }
      if (num)  num.textContent  = fmtTime(timeLeft);
      if (timeLeft <= 0) {
        clearInterval(timerInterval);
        gameState = 'over';
        levelResults.push({ outcome: 'lost', score: 0 });
        setHint('CONNECTION_LOST');
        triggerGlitch('glitch-fail', 850);
        setTimeout(() => advanceLevel(false), 1800);
      }
    }, 1000);
  }


  render();
  ghostTick();
  openGlitchTick();

  // ─── ПЕРЕКЛЮЧЕНИЕ ТЕМ ───
  const THEMES = ['', 'cyber'];
  let themeIdx = 0;
  document.getElementById('theme-toggle').addEventListener('click', () => {
    themeIdx = (themeIdx + 1) % THEMES.length;
    root.dataset.theme = THEMES[themeIdx];
  });
})();
</script>
